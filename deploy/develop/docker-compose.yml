services:
  # tracer:
  #   image: jaegertracing/all-in-one:latest
  #   ports: [ "16686:16686" ]

  s3server:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ACCESS_KEY: ${S3_ACCESS_KEY}
      MINIO_SECRET_KEY: ${S3_SECRET_KEY}
    volumes:
      - /tmp/data/minio/:/data

  redis:
    image: redis

  fileserver:
    image: halverneus/static-file-server:latest
    ports:
      - "8090:8080"
    environment:
      FOLDER: /web
      SHOW_LISTING: "true"
    volumes:
      - /tmp/data/minio/:/web

  nats:
    image: nats
    expose: [ "4222" ]

  server:
    image: github.com/apfs-io/apfs:ubuntu-imagemagick
    ports:
      - "18080:8080"
      - "18082:8082"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 7s
      timeout: 2s
      retries: 5
    depends_on:
      redis:
        condition: service_started
      nats:
        condition: service_started
      fileserver:
        condition: service_started
      s3server:
        condition: service_started
    env_file:
      - ../../.env
    environment:
      STORAGE_CONVERTERS: image,procedure,shell,exec,docker
      WORKER_TAGS: image,gpu,cpu,docker,video,any
    volumes:
      - /tmp/data/minio/:/tmp/data/storage
      - /var/run/docker.sock:/var/run/docker.sock

  seed:
    image: python:3-alpine
    depends_on:
      s3server:
        condition: service_started
      server:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      S3_ENDPOINT: http://s3server:9000
      S3_BUCKET: assets
      WORKFLOWS_DIR: /workflows
    volumes:
      - ../init:/init:ro
      - ../workflows:/workflows:ro
    entrypoint: ["/bin/sh", "/init/seed-workflows.sh"]

  test:
    image: github.com/apfs-io/apfs-testapp:latest
    depends_on:
      seed:
        condition: service_completed_successfully
    environment:
      STORAGE_CONNECT: tcp://server:8081/images

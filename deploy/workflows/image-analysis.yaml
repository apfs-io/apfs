# Image Analysis Workflow
#
# Computes an embedding vector and detects faces in uploaded images.
# Requires Python deps from deploy/procedures/requirements.txt on gpu/cpu workers.
#
# Bucket/group: analysis

version: "2"
name: image-analysis
description: Image embedding vector and face detection.

content_types:
  - image/jpeg
  - image/png
  - image/webp

keep_original: true

validate:
  content_types:
    - image/jpeg
    - image/png
    - image/webp

jobs:
  vectorize:
    runs-on: gpu
    on-failure: continue
    steps:
      - name: img2vec
        uses: procedure
        with:
          name: image2vec
          target-meta: vector

      # Alternative: run inside Docker when Python/torch is not on the host.
      # - name: img2vec-docker
      #   uses: docker
      #   docker:
      #     image: pytorch/pytorch:2.3.0-cuda12.1-cudnn8-runtime
      #     retain_container: true
      #     remove_after_done: false
      #   with:
      #     target-meta: vector
      #   run: |
      #     python3 /app/image2vec.py "{{inputFile}}"

  faces:
    runs-on: cpu
    on-failure: continue
    steps:
      - name: detect
        uses: procedure
        with:
          name: facemeta
          cascPath: haarcascade_frontalface_default.xml
          target-meta: faces

  dimensions:
    runs-on: image
    steps:
      - name: probe
        uses: shell
        with:
          target-meta: dimensions
        run: |
          identify -format '{"w":%w,"h":%h}' "{{inputFile}}"

# Video Transcoding Workflow
#
# Demonstrates Docker steps for heavy workloads.
# FFmpeg runs in a container so no system-level installation is required on
# the worker node — only a Docker daemon.
#
# Produces:
#   - main.mp4   — H.264 @ 1080 p
#   - small.mp4  — H.264 @ 480 p
#   - thumb.jpg  — first-frame thumbnail

name: video-transcode

on:
  content_types:
    - video/mp4
    - video/quicktime
    - video/x-msvideo
  max_size: 2GB
  keep_original: false

jobs:
  hd:
    name: Transcode 1080 p
    runs-on: video-worker
    steps:
      - name: ffmpeg-hd
        uses: docker
        docker:
          image: jrottenberg/ffmpeg:4.4-alpine
          remove_after_done: true
        with:
          target: main.mp4
        run: |
          ffmpeg -i "{{inputFile}}" \
            -vf "scale=-2:1080" \
            -c:v libx264 -preset fast -crf 22 \
            -c:a aac -b:a 128k \
            -movflags +faststart \
            -y "{{outputFile}}"

  sd:
    name: Transcode 480 p
    runs-on: video-worker
    needs: [hd]
    steps:
      - name: ffmpeg-sd
        uses: docker
        docker:
          image: jrottenberg/ffmpeg:4.4-alpine
          remove_after_done: true
        with:
          target: small.mp4
        run: |
          ffmpeg -i "{{inputFile}}" \
            -vf "scale=-2:480" \
            -c:v libx264 -preset fast -crf 26 \
            -c:a aac -b:a 96k \
            -movflags +faststart \
            -y "{{outputFile}}"

  thumbnail:
    name: Extract first-frame thumbnail
    runs-on: video-worker
    steps:
      - name: ffmpeg-thumb
        uses: docker
        docker:
          image: jrottenberg/ffmpeg:4.4-alpine
          remove_after_done: true
        with:
          target: thumb.jpg
        run: |
          ffmpeg -i "{{inputFile}}" \
            -vframes 1 -q:v 2 \
            -y "{{outputFile}}"

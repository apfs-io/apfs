syntax = "proto3";

package v1;

option go_package = "./v1";
option java_multiple_files = true;
option java_outer_classname = "Server";
option java_package = "com.apfs.protocol.v1";

import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

import "v1/common.proto";
import "v1/object.proto";
import "v1/manifest.proto";
import "v1/workflow.proto";
import "v1/state.proto";

message ManifestGroup {
  string    group       = 1;
}

message DataManifest {
  Manifest  manifest    = 1;
  string    group       = 2;
}

message DataContent {
  bytes     content     = 1;
}

message DataCustomID {
  string    group       = 1;
  string    custom_id   = 2;
  bool      overwrite   = 3;
}

message Data {
  oneof item {
    DataCustomID  info      = 1;
    DataContent   content   = 2;
  }
  repeated string tags      = 3;
}

// ObjectRequestOptions controls which optional data is included in the object response.
message ObjectRequestOptions {
  bool with_workflow   = 1; // include bucket workflow manifest
  bool with_state      = 2; // include processing state (counters only)
  bool state_full      = 3; // include full job details (requires with_state=true)
}

message ObjectID {
  string                id        = 1;
  // The list of possible required files. Will be taked only first existing file
  repeated string       name      = 2;
  ObjectRequestOptions  options   = 3; // optional; nil = default (no extras)
}

message ObjectIDNames {
  string          id        = 1;
  repeated string names     = 2;
}

message ManifestResponse {
  ResponseStatusCode  status        = 1;
  string              message       = 2;
  Manifest            manifest      = 3;
}

message SimpleResponse {
  ResponseStatusCode  status        = 1;
  string              message       = 2;
}

message SimpleObjectResponse {
  ResponseStatusCode  status        = 1;
  string              message       = 2;
  Object              object        = 3;
}

message ObjectResponse {
  oneof object {
    SimpleObjectResponse response   = 1;
    DataContent          content    = 2;
  }
}

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  host: "localhost:9678";
  base_path: "/v1";
	info: {
		title: "apfs file-processing stream tool";
		version: "1.0";
		contact: {
			name: "apfs file-processing project";
			url: "https://apfs.io/gateway";
			email: "info@apfs.io";
		};
  };
	// Overwriting host entry breaks tests, so this is not done here.
	external_docs: {
		url: "https://docs.apfs.io/api";
		description: "apfs API docs";
	}
	schemes: HTTP;
	schemes: HTTPS;
	schemes: WSS;
	consumes: "application/json";
	produces: "application/json";
};

// defined in the system.
service ServiceAPI {
  // Get object information
  rpc Head(ObjectID) returns (SimpleObjectResponse) {
    option (google.api.http) = {
      get: "/v1/head/{id=**}"
    };
  };

  // Get object and data
  rpc Get(ObjectID) returns (stream ObjectResponse) {
    option (google.api.http) = {
      get: "/v1/object/{id}"
    };
  };

  // Refresh object and reprocess
  rpc Refresh(ObjectID) returns (SimpleResponse) {
    option (google.api.http) = {
      put: "/v1/refresh/{id=**}"
      body: "*"
    };
  };

  // SetManifest of the group
  rpc SetManifest(DataManifest) returns (SimpleResponse) {
    option (google.api.http) = {
      put: "/v1/manifest/{group}"
      body: "*"
    };
  };

  // GetManifest of the group
  rpc GetManifest(ManifestGroup) returns (ManifestResponse) {
    option (google.api.http) = {
      get: "/v1/manifest/{group}"
    };
  };

  // Upload new file as a stream
  rpc Upload(stream Data) returns (SimpleObjectResponse) {
    option (google.api.http) = {
      post: "/v1/object"
      body: "*"
    };
  };

  // Delete file object or subitems
  rpc Delete(ObjectIDNames) returns (SimpleResponse) {
    option (google.api.http) = {
      delete: "/v1/object/{id=**}"
    };
  };

  // SetWorkflow stores a v2 workflow manifest for a group/bucket.
  rpc SetWorkflow(DataWorkflow) returns (SimpleResponse) {
    option (google.api.http) = {
      put: "/v1/workflow/{group}"
      body: "*"
    };
  };

  // GetWorkflow returns the v2 workflow manifest for a group/bucket.
  rpc GetWorkflow(ManifestGroup) returns (WorkflowResponse) {
    option (google.api.http) = {
      get: "/v1/workflow/{group}"
    };
  };

  // GetProcessingState returns the current processing state for an object.
  rpc GetProcessingState(ObjectID) returns (ProcessingStateResponse) {
    option (google.api.http) = {
      get: "/v1/state/{id=**}"
    };
  };

  // WatchProcessingState streams processing state updates for an object.
  // The stream ends when the object reaches a terminal state.
  rpc WatchProcessingState(ObjectID) returns (stream ProcessingState) {
    option (google.api.http) = {
      get: "/v1/state/watch/{id=**}"
    };
  };
}
